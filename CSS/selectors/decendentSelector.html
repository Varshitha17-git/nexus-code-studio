<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <style>

         /* target only grandchild */
        /* #parent #gc{
            background-color: blueviolet;
        }

        #parent1 h1{

        /* child selector */

        /* targets only direct child of parent */
        #parent>h1{

            background-color: blueviolet;
        }

        #parent>section>#gc{

            background-color: cadetblue;
        }

        #parent1>section>#gc1{
            background-color: cyan;
        }

        #parent1>h1{
            background-color: darkorange;
        }

        h1{
            background-color: chartreuse ;
        }



    </style>
</head>
<body>
    
    <div id="parent">
        <h1>I am First Child</h1>
        <section>
            <h1 id="gc">I am grand child</h1>
        </section>
    </div>

    <div id="parent1">
        <h1>I am first child </h1>
        <section>
            <h1 id="gc1">I am grand child</h1>
        </section>
    </div>
</body>
