<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .headings>h1:first-child{
            color: red;
            font-family: 'Courier New', Courier, monospace;
        }
        .headings>h1:last-child{
            color: blue;
            font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }
        .headings>h1:nth-child(3){
            color: green;
            font-family: 'Arial', sans-serif;
            font-size: 2.5rem;
        }
        .headings>h1:nth-child(3n+1){
            color: orange;
            font-family: 'Times New Roman', Times, serif;
            font-size: 2.5rem;
        }

        .headings>h1:nth-child(even){
            color: purple;
            font-family: 'Georgia', serif;
            font-size: 2.5rem;
        }
        .headings>h1:nth-child(odd){
            color: pink;
            font-family: 'Verdana', sans-serif;
            font-size: 2.5rem;
        }

    </style>
</head>
<body>
    
    <div class="headings">
        <h1>This is 1st element</h1>
        <h1>This is 2nd element</h1>
        <h1>This is 3rd element</h1>
        <h1>This is 4th element</h1>
        <h1>This is 5th element</h1>
        <h1>This is 6th element</h1>
        <h1>This is 7th element</h1>
        <h1>This is 8th element</h1>
    </div>
</body>
</html>
