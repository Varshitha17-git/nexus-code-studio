<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        button{
            height: 50px;
            width: 100px;
            color: white;
            font-size: 16px;
            border-radius:5px;
            border: none;
            cursor: pointer;
        }

        button:hover{
            border: 1px solid blue;
            color:blue;
            background-color:transparent;
        }

        input{
            height:40px;
            width:300px;
            outline:none;
        }

        input:focus{
            border:5px solid red;

        }

        input:focus{
            border:5px solid red;
        }

        a:link{

            color:black;
        }

        a:active{
            color:oranged;
        }

        a:visited{
            color:green;
        }

        h1:first-child{
            background-color: blue;
            color:white;

        }

        h1:last-child{
            background-color: green;
            color:white;
        }

        h1:nth-child(even){
            background-color: red;
            color:white;
        }

        h1:nth-of-type(odd){
            background-color: black;
            color: aliceblue;
        }





    </style>
</head>
<body>
    <button>click me</button>
    <input type="text" placeholder="Enter you name">
    <a href="##">click here</a>
    <a href="###">click here</a>

    <div>

        <h1>Hello world!</h1>
        <h1>Hello world!</h1>
        <h2>Hello world!</h2>
        <p>This is a first paragraph</p>
        <h1>Hello world!</h1>
        <h1>Hello world!</h1>
        <p> This is a Second Paragraph</p>
        <h2>Hello World!</h2>
    </div>
</body>
</html>
