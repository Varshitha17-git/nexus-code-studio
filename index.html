<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>⚡ Nexus Code Editor | Live Frontend Playground</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Inter + Fira Code -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <div class="top-bar">
        <div class="logo-area">
            <i class="fas fa-code logo-icon"></i>
            <h1>✨ Nexus Code Studio</h1>
            <span class="status-badge" style="background: #2d2d2d;"><i class="fas fa-sync-alt"></i> Live Render</span>
        </div>
        <div class="tool-group">
            <button id="downloadBtn" class="action-btn"><i class="fas fa-download"></i> Export .html</button>
            <button id="copyBtn" class="action-btn"><i class="far fa-copy"></i> Copy Code</button>
            <button id="clearBtn" class="action-btn"><i class="fas fa-eraser"></i> Reset</button>
            <div id="themeSwitcher" class="theme-toggle"><i class="fas fa-moon"></i> <span>Dark</span></div>
        </div>
    </div>

    <div class="split-view">
        <!-- EDITOR SECTION -->
        <div class="editor-panel">
            <div class="code-section">
                <div class="label-header"><i class="fab fa-html5" style="color:#e06c75;"></i> HTML</div>
                <textarea id="htmlCode" class="code-textarea" rows="5" placeholder="<!-- Write semantic HTML -->"></textarea>
            </div>
            <div class="code-section">
                <div class="label-header"><i class="fab fa-css3-alt" style="color:#61afef;"></i> CSS</div>
                <textarea id="cssCode" class="code-textarea" rows="5" placeholder="/* Style your elements */"></textarea>
            </div>
            <div class="code-section">
                <div class="label-header"><i class="fab fa-js" style="color:#e5c07b;"></i> JavaScript</div>
                <textarea id="jsCode" class="code-textarea" rows="5" placeholder="// Add interactivity ..."></textarea>
            </div>
            <div class="action-run-area">
                <button id="runBtn" class="btn-run"><i class="fas fa-play"></i> Run ▶️</button>
            </div>
        </div>

        <!-- OUTPUT SECTION -->
        <div class="output-panel">
            <div class="output-header">
                <div class="status-badge"><span class="live-dot"></span> Live Preview</div>
                <div class="status-badge"><i class="far fa-window-maximize"></i> iframe sandbox</div>
            </div>
            <div class="iframe-wrapper">
                <iframe id="outputFrame" title="Live Output" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
            </div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
